<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório - 13º BBM</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <style>
        .container { max-width: 500px; }
        .btn-whats { display: block; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; text-align: center; color: white; border: none; font-size: 1.1rem; cursor: pointer; transition: 0.3s;}
        .btn-socorro { background-color: #25D366; } .btn-socorro:hover { background-color: #1DA851; }
        .caixa-relatorio { background: #f8f9fa; padding: 15px; border-radius: 8px; font-size: 0.85rem; white-space: pre-wrap; border: 1px solid #ddd; font-family: monospace; color: #333; margin-bottom: 20px;}
    </style>
</head>
<body>
    <main class="container">
        <h2 style="color: #d32f2f; text-align: center; margin-bottom: 20px;">Relatório Finalizado</h2>
        
        <div id="loading" style="text-align: center; font-weight: bold; color: #666;">⏳ A gerar relatório...</div>
        
        <div id="area-relatorio" style="display: none;">
            <div class="caixa-relatorio" id="texto-visivel"></div>

            <button onclick="copiarRelatorio()" class="btn-whats btn-socorro">📋 Copiar Relatório para o WhatsApp</button>
            <p style="text-align: center; font-size: 0.8rem; color: #666; margin-top: 10px;">Clique acima, abra o WhatsApp e cole (Ctrl+V) na conversa desejada.</p>
        </div>

        <a href="viaturas.html" class="btn-voltar-login" style="display: block; text-align: center; margin-top: 25px;">⬅ Voltar às Viaturas</a>
    </main>

    <script>
        let textoOriginal = "";

        window.onload = async function() {
            const guarnicaoLocal = JSON.parse(localStorage.getItem('guarnicaoServico') || '[]');
            const viaturasLocal = JSON.parse(localStorage.getItem('statusViaturas') || '{}');

            try {
                const res = await fetch('/api/relatorio', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ guarnicao: guarnicaoLocal, viaturas_status: viaturasLocal })
                });
                const dados = await res.json();

                if(dados.sucesso) {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('area-relatorio').style.display = 'block';
                    
                    textoOriginal = dados.texto;
                    document.getElementById('texto-visivel').innerText = textoOriginal;
                } else { document.getElementById('loading').innerHTML = `<span style="color:red;">Erro: ${dados.mensagem}</span>`; }
            } catch(e) { document.getElementById('loading').innerHTML = `<span style="color:red;">Erro de ligação ao servidor.</span>`; }
        }

        function copiarRelatorio() {
            navigator.clipboard.writeText(textoOriginal).then(() => {
                alert("✅ Relatório COPIADO com sucesso!\n\nAgora basta abrir o seu WhatsApp e colar o texto na conversa do Chefe de Socorro.");
            }).catch(err => {
                alert("❌ Ocorreu um erro ao copiar. Por favor, selecione o texto acima e copie manualmente.");
            });
        }
    </script>
</body>
</html>
